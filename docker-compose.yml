version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fairstake-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: fairstake
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: fairstake-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fairstake.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
